<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Home Control</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Config untuk Tailwind -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dark: {
                900: '#0f0f0f',
                800: '#1b1b1b',
                700: '#2a2a2a',
              },
              accent: {
                DEFAULT: '#ffcc00',
                hover: '#ffdf40',
              },
              temp: '#ff6b6b',
              hum: '#4ecdc4',
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              glow: {
                '0%': { 'box-shadow': '0 0 5px rgba(255, 204, 0, 0.3)' },
                '100%': { 'box-shadow': '0 0 20px rgba(255, 204, 0, 0.6)' },
              }
            }
          }
        }
      }
    </script>
    
    <style>
      /* Custom Toggle Switch */
      .toggle-checkbox:checked {
        right: 0;
        border-color: #ffcc00;
      }
      .toggle-checkbox:checked + .toggle-label {
        background-color: #ffcc00;
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
      }
      .toggle-label {
        transition: all 0.3s ease;
      }
      .toggle-checkbox {
        transition: all 0.3s ease;
      }
      
      /* Smooth transitions for cards */
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 40px rgba(255, 204, 0, 0.2);
      }
      
      /* Icon animation when on */
      .icon-on {
        animation: glow 1.5s ease-in-out infinite alternate;
      }
      
      /* Hide scrollbar for clean look */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1b1b1b;
      }
      ::-webkit-scrollbar-thumb {
        background: #ffcc00;
        border-radius: 3px;
      }
    </style>
  </head>
  
  <body class="bg-dark-900 text-gray-100 font-sans antialiased min-h-screen">
    
    <!-- Status Indicator -->
    <div class="fixed top-4 right-4 z-50 flex items-center gap-2 bg-dark-800 px-4 py-2 rounded-full shadow-lg border border-gray-700">
      <span id="status-dot" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
      <span id="status-text" class="text-sm font-medium text-gray-300">Offline</span>
    </div>

    <!-- Header -->
    <header class="pt-8 pb-6 px-4 text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-accent drop-shadow-lg mb-2">
        <i class="fas fa-house-chimney mr-2"></i>Smart Home Control
      </h1>
      <p class="text-gray-400 text-sm md:text-base">Kontrol lampu & pantau suhu ruangan</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 pb-12">
      
      <!-- Control Buttons -->
      <div class="flex justify-center gap-4 mb-8 flex-wrap">
        <button 
          onclick="toggleAll(true)"
          class="bg-accent hover:bg-accent-hover text-dark-900 font-semibold px-6 py-3 rounded-xl shadow-lg hover:shadow-accent/30 transition-all duration-300 flex items-center gap-2 active:scale-95"
        >
          <i class="fas fa-sun"></i>
          <span>Nyalakan Semua</span>
        </button>
        <button 
          onclick="toggleAll(false)"
          class="bg-dark-700 hover:bg-gray-600 text-white font-semibold px-6 py-3 rounded-xl shadow-lg transition-all duration-300 flex items-center gap-2 active:scale-95"
        >
          <i class="fas fa-moon"></i>
          <span>Matikan Semua</span>
        </button>
      </div>

      <!-- DHT11 Sensor Card -->
      <div class="bg-dark-800 rounded-2xl p-6 mb-8 shadow-xl border border-gray-700 card-hover">
        <div class="flex items-center justify-center gap-2 mb-4">
          <i class="fas fa-thermometer-half text-temp text-2xl"></i>
          <h2 class="text-xl font-semibold text-gray-200">Sensor Lingkungan</h2>
          <i class="fas fa-droplet text-hum text-2xl"></i>
        </div>
        
        <div class="grid grid-cols-2 gap-6 max-w-md mx-auto">
          <!-- Temperature -->
          <div class="text-center p-4 bg-dark-700/50 rounded-xl">
            <div class="text-5xl font-bold text-temp mb-1 flex items-center justify-center gap-1">
              <i class="fas fa-fire-flame-curved text-sm"></i>
              <span id="temp-value">--.-</span>
            </div>
            <div class="text-gray-400 text-sm">Suhu</div>
            <div class="text-gray-500 text-xs mt-1">°Celsius</div>
          </div>
          
          <!-- Humidity -->
          <div class="text-center p-4 bg-dark-700/50 rounded-xl">
            <div class="text-5xl font-bold text-hum mb-1 flex items-center justify-center gap-1">
              <i class="fas fa-droplet text-sm"></i>
              <span id="hum-value">--.-</span>
            </div>
            <div class="text-gray-400 text-sm">Kelembapan</div>
            <div class="text-gray-500 text-xs mt-1">Persen</div>
          </div>
        </div>
        
        <div class="text-center mt-4">
          <span id="last-update" class="text-xs text-gray-500">Memuat data sensor...</span>
        </div>
      </div>

      <!-- Lamp Cards Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-5">
        
        <!-- Lamp Card Template (Repeat for each lamp) -->
        <!-- Dapur - Pin 0 -->
        <div class="bg-dark-800 rounded-2xl p-5 shadow-lg border border-gray-700 card-hover flex flex-col items-center">
          <h3 class="text-lg font-semibold text-gray-200 mb-3">
            <i class="fas fa-kitchen-set mr-2 text-accent"></i>Dapur
          </h3>
          
          <div id="icon0" class="text-6xl mb-4 text-gray-600 transition-all duration-300">
            <i class="fas fa-lightbulb"></i>
          </div>
          
          <!-- Toggle Switch -->
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" onchange="toggleLamp(0, this.checked)">
            <div class="toggle-label w-14 h-8 bg-gray-600 rounded-full peer peer-checked:after:translate-x-7 peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all"></div>
          </label>
        </div>

        <!-- Kamar 2 - Pin 1 -->
        <div class="bg-dark-800 rounded-2xl p-5 shadow-lg border border-gray-700 card-hover flex flex-col items-center">
          <h3 class="text-lg font-semibold text-gray-200 mb-3">
            <i class="fas fa-bed mr-2 text-accent"></i>Kamar 2
          </h3>
          
          <div id="icon1" class="text-6xl mb-4 text-gray-600 transition-all duration-300">
            <i class="fas fa-lightbulb"></i>
          </div>
          
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" onchange="toggleLamp(1, this.checked)">
            <div class="toggle-label w-14 h-8 bg-gray-600 rounded-full peer peer-checked:after:translate-x-7 peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all"></div>
          </label>
        </div>

        <!-- Ruang Tamu - Pin 2 -->
        <div class="bg-dark-800 rounded-2xl p-5 shadow-lg border border-gray-700 card-hover flex flex-col items-center">
          <h3 class="text-lg font-semibold text-gray-200 mb-3">
            <i class="fas fa-couch mr-2 text-accent"></i>Ruang Tamu
          </h3>
          
          <div id="icon2" class="text-6xl mb-4 text-gray-600 transition-all duration-300">
            <i class="fas fa-lightbulb"></i>
          </div>
          
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" onchange="toggleLamp(2, this.checked)">
            <div class="toggle-label w-14 h-8 bg-gray-600 rounded-full peer peer-checked:after:translate-x-7 peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all"></div>
          </label>
        </div>

        <!-- Kamar Mandi - Pin 3 -->
        <div class="bg-dark-800 rounded-2xl p-5 shadow-lg border border-gray-700 card-hover flex flex-col items-center">
          <h3 class="text-lg font-semibold text-gray-200 mb-3">
            <i class="fas fa-bath mr-2 text-accent"></i>Kamar Mandi
          </h3>
          
          <div id="icon3" class="text-6xl mb-4 text-gray-600 transition-all duration-300">
            <i class="fas fa-lightbulb"></i>
          </div>
          
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" onchange="toggleLamp(3, this.checked)">
            <div class="toggle-label w-14 h-8 bg-gray-600 rounded-full peer peer-checked:after:translate-x-7 peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all"></div>
          </label>
        </div>

        <!-- Kamar 1 - Pin 4 -->
        <div class="bg-dark-800 rounded-2xl p-5 shadow-lg border border-gray-700 card-hover flex flex-col items-center">
          <h3 class="text-lg font-semibold text-gray-200 mb-3">
            <i class="fas fa-bed mr-2 text-accent"></i>Kamar 1
          </h3>
          
          <div id="icon4" class="text-6xl mb-4 text-gray-600 transition-all duration-300">
            <i class="fas fa-lightbulb"></i>
          </div>
          
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" onchange="toggleLamp(4, this.checked)">
            <div class="toggle-label w-14 h-8 bg-gray-600 rounded-full peer peer-checked:after:translate-x-7 peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all"></div>
          </label>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-gray-500 text-sm border-t border-gray-800">
      <p>
        <i class="fas fa-bolt text-accent mr-1"></i>
        Powered by Blynk IoT Platform
      </p>
    </footer>

    <!-- JavaScript -->
    <script>
      // 🔐 Konfigurasi
      const TOKEN = "NKmezK24n3jRLMfa5YaP62Wupuu6VtVx";
      const lampPins = [0, 1, 2, 3, 4];
      const TEMP_PIN = 5;   // Virtual Pin untuk Suhu
      const HUM_PIN = 6;    // Virtual Pin untuk Kelembapan

      // 💡 Toggle Lamp Function
      async function toggleLamp(pin, state) {
        const value = state ? 1 : 0;
        const icon = document.getElementById(`icon${pin}`);
        
        try {
          await fetch(
            `https://blynk.cloud/external/api/update?token=${TOKEN}&V${pin}=${value}`
          );
          
          // Update icon style
          if (state) {
            icon.classList.remove('text-gray-600');
            icon.classList.add('text-accent', 'icon-on');
            icon.innerHTML = '<i class="fas fa-lightbulb"></i>';
          } else {
            icon.classList.remove('text-accent', 'icon-on');
            icon.classList.add('text-gray-600');
            icon.innerHTML = '<i class="fas fa-lightbulb"></i>';
          }
        } catch (err) {
          console.error("❌ Gagal toggle lamp:", err);
          alert("Gagal mengontrol lampu. Periksa koneksi internet.");
        }
      }

      // 🌞🌑 Toggle All Lamps
      async function toggleAll(state) {
        for (let pin of lampPins) {
          await toggleLamp(pin, state);
          const checkbox = document.querySelector(
            `input[onchange="toggleLamp(${pin}, this.checked)"]`
          );
          if (checkbox) checkbox.checked = state;
        }
      }

      // 🌡️💧 Fetch Sensor Data from Blynk
      async function fetchSensorData() {
        try {
          // Fetch Temperature
          const tempRes = await fetch(
            `https://blynk.cloud/external/api/get?token=${TOKEN}&V${TEMP_PIN}`
          );
          const tempData = await tempRes.text();
          
          // Fetch Humidity
          const humRes = await fetch(
            `https://blynk.cloud/external/api/get?token=${TOKEN}&V${HUM_PIN}`
          );
          const humData = await humRes.text();

          // Update UI with animation
          if (tempData && tempData !== "null" && !isNaN(tempData)) {
            const tempEl = document.getElementById("temp-value");
            tempEl.textContent = parseFloat(tempData).toFixed(1);
            tempEl.classList.add('animate-pulse');
            setTimeout(() => tempEl.classList.remove('animate-pulse'), 500);
          }
          
          if (humData && humData !== "null" && !isNaN(humData)) {
            const humEl = document.getElementById("hum-value");
            humEl.textContent = parseFloat(humData).toFixed(1);
            humEl.classList.add('animate-pulse');
            setTimeout(() => humEl.classList.remove('animate-pulse'), 500);
          }
          
          // Update timestamp
          const now = new Date();
          document.getElementById("last-update").innerHTML = 
            `<i class="fas fa-clock mr-1"></i>Update: ${now.toLocaleTimeString("id-ID")}`;
          
        } catch (err) {
          console.error("❌ Gagal ambil data sensor:", err);
          document.getElementById("last-update").innerHTML = 
            '<i class="fas fa-exclamation-triangle text-red-500 mr-1"></i>Gagal memuat data';
        }
      }

      // 📡 Check Hardware Connection Status
      async function checkStatus() {
        try {
          const res = await fetch(
            `https://blynk.cloud/external/api/isHardwareConnected?token=${TOKEN}`
          );
          const status = await res.text();
          
          const dot = document.getElementById("status-dot");
          const text = document.getElementById("status-text");

          if (status === "true") {
            dot.className = "w-3 h-3 rounded-full bg-green-500 animate-pulse";
            text.textContent = "Online";
            text.className = "text-sm font-medium text-green-400";
          } else {
            dot.className = "w-3 h-3 rounded-full bg-red-500 animate-pulse";
            text.textContent = "Offline";
            text.className = "text-sm font-medium text-red-400";
          }
        } catch (err) {
          console.error("❌ Status check error:", err);
        }
      }

      // 🚀 Initialize on Load
      document.addEventListener('DOMContentLoaded', () => {
        checkStatus();
        fetchSensorData();
        
        // Auto refresh intervals
        setInterval(checkStatus, 5000);      // Status tiap 5 detik
        setInterval(fetchSensorData, 3000);  // Sensor tiap 3 detik
      });
    </script>
  </body>
</html>
